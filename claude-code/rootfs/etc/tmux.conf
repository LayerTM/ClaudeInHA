# tmux config for the Claude Console web terminal.
#
# allow-passthrough + set-clipboard: let applications (Claude Code) emit
# OSC 52 clipboard sequences through tmux to the web frontend.
#
# mouse ON: the wheel scrolls the pane's history (via the copy-mode wheel
# bindings below) — essential for reading back through long output. Text
# selection is native: a modifier-drag bypasses tmux's mouse capture into a real
# xterm.js selection, which the frontend copies synchronously in the pointer
# gesture so it reaches the clipboard even over plain HTTP. The modifier is
# Shift+drag on Windows/Linux/ChromeOS and Option(Alt)+drag on macOS (xterm
# ignores Shift on Mac — the frontend sets macOptionClickForcesSelection).
# Cmd+C / Ctrl+Shift+C / Ctrl+Insert copy the current selection too. A plain drag
# (no modifier) is a tmux selection → OSC 52 → the 📥 tray. (Turning mouse OFF
# would make plain-drag a native selection but break wheel-scroll, since tmux
# holds the outer terminal in the alternate screen — no scrollback there.)
set -g history-limit 50000
set -g mouse on
# The web frontend renders its own right-click Copy/Paste menu; drop tmux's
# built-in right-button pane menu so the two don't both open.
unbind -n MouseDown3Pane
set -g allow-passthrough on
set -g set-clipboard on
set -g escape-time 0
set -g focus-events on
set -g aggressive-resize on
set -g renumber-windows off
set -g set-titles off
set -g status off
set -g default-terminal "xterm-256color"

# True-colour (24-bit) passthrough — without this tmux downsamples Claude's
# truecolor UI to 256 colours, which reads as muddy/banded.
set -ga terminal-overrides ",*:Tc"

# Brisk, deterministic wheel — 3 lines per notch in copy-mode (matches the
# frontend's scrollSensitivity), for a native-mouse feel over tmux-owned panes.
bind -T copy-mode    WheelUpPane   send -N3 -X scroll-up
bind -T copy-mode    WheelDownPane send -N3 -X scroll-down
bind -T copy-mode-vi WheelUpPane   send -N3 -X scroll-up
bind -T copy-mode-vi WheelDownPane send -N3 -X scroll-down
