# tmux config for the Claude Console web terminal.
#
# allow-passthrough + set-clipboard: let applications (Claude Code) emit
# OSC 52 clipboard sequences through tmux to the web frontend.
# mouse on: wheel scrolls pane history; the frontend handles selection
# with Shift-bypass and toolbar copy buttons.
set -g history-limit 50000
set -g mouse on
set -g allow-passthrough on
set -g set-clipboard on
set -g escape-time 0
set -g focus-events on
set -g aggressive-resize on
set -g renumber-windows off
set -g set-titles off
set -g status off
set -g default-terminal "xterm-256color"

# True-colour (24-bit) passthrough — without this tmux downsamples Claude's
# truecolor UI to 256 colours, which reads as muddy/banded.
set -ga terminal-overrides ",*:Tc"

# Brisk, deterministic wheel — 3 lines per notch in copy-mode (matches the
# frontend's scrollSensitivity), for a native-mouse feel over tmux-owned panes.
bind -T copy-mode    WheelUpPane   send -N3 -X scroll-up
bind -T copy-mode    WheelDownPane send -N3 -X scroll-down
bind -T copy-mode-vi WheelUpPane   send -N3 -X scroll-up
bind -T copy-mode-vi WheelDownPane send -N3 -X scroll-down
