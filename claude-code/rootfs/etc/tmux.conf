# tmux config for the ttyd web terminal.
#
# mouse on:
#   • wheel scrolls the tmux pane through history-limit (50k lines).
#     This is the headline UX fix — without it, Claude's mouse
#     tracking (DECSET 1003) ate every wheel event and the user had
#     no way to scroll back at all.
#   • plain drag and right-click are also consumed by tmux now, so
#     they no longer reach the browser. The escape hatch is the same
#     Shift-modifier bypass xterm.js already implemented for app
#     mouse tracking: Terminal.ts:780 short-circuits CSI forwarding
#     whenever SelectionService.shouldForceSelection() returns true,
#     which on non-Mac means Shift is held. So:
#       Shift+drag        → native browser selection (Ctrl+Shift+C copies)
#       Shift+right-click → browser context menu
#     The welcome banner documents this.
#
# v0.2.2 disabled mouse on because plain drag landed in tmux's
# copy-mode buffer with no fallback. v0.2.5 turns it back on now
# that the Shift-bypass is wired into the banner and CHANGELOG.
set -g history-limit 50000
set -g mouse on
