# /etc/tmux.conf — defaults for Claude Code HA add-on
# Users can override these in ~/.tmux.conf (i.e. /data/home/.tmux.conf).

# Mouse support: drag-select to copy, wheel-scroll through scrollback, click
# panes/windows. Without this, right-click in the ttyd terminal falls through
# to the browser, and mouse-wheel scroll does nothing useful.
set -g mouse on

# Let the terminal's clipboard (ttyd/xterm.js via OSC 52) be the source of
# truth. When you select text with the mouse, it goes to the browser clipboard
# automatically instead of being trapped inside tmux's copy-mode buffer.
set -g set-clipboard on

# Tell tmux the outer terminal supports OSC 52 clipboard, truecolor, and
# focus events — xterm.js does.
set -ga terminal-overrides ',xterm*:Ms=\\E]52;c;%p2%s\\7'
set -ga terminal-overrides ',xterm-256color:Tc'
set -g focus-events on

# Larger scrollback so long OAuth URLs etc. don't get lost.
set -g history-limit 50000

# No delay after ESC — helps interactive Claude prompts feel snappy.
set -s escape-time 0

# Keep names predictable; don't rename windows behind the user's back.
set -g allow-rename off
set -g automatic-rename off

# Start window/pane numbering at 1 (cosmetic — easier on the fingers).
set -g base-index 1
setw -g pane-base-index 1
