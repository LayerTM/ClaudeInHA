# /etc/tmux.conf — defaults for Claude Code HA add-on
# Users can override these in ~/.tmux.conf (i.e. /data/home/.tmux.conf).

# Mouse is deliberately OFF so xterm.js (the terminal running in the browser)
# handles every mouse event directly. That way:
#   • drag-to-select works natively, and ttyd's copyOnSelect=true auto-copies
#     the selection to the browser clipboard (no tmux copy-mode middleman, no
#     OSC 52 round-trip that the HA iframe may block).
#   • right-click falls through to the browser's context menu, so Paste is
#     available even in browsers that restrict the Clipboard API inside iframes.
#   • mouse-wheel scrolls the xterm.js scrollback. Claude Code is a full-screen
#     TUI so tmux's own scrollback is rarely useful here anyway.
# Enable in ~/.tmux.conf if you prefer tmux's mouse handling.
set -g mouse off

# set-clipboard kept on as a harmless fallback for any app inside tmux that
# emits OSC 52 directly — xterm.js supports it.
set -g set-clipboard on

# Larger scrollback so long OAuth URLs etc. don't get lost.
set -g history-limit 50000

# No delay after ESC — helps interactive Claude prompts feel snappy.
set -s escape-time 0

# Keep names predictable; don't rename windows behind the user's back.
set -g allow-rename off
set -g automatic-rename off

# Start window/pane numbering at 1 (cosmetic — easier on the fingers).
set -g base-index 1
setw -g pane-base-index 1

# Focus events pass through so Claude Code and editors notice tab focus changes.
set -g focus-events on
