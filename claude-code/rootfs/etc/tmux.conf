# tmux config for the Claude Console web terminal.
#
# allow-passthrough + set-clipboard: let applications (Claude Code) emit
# OSC 52 clipboard sequences through tmux to the web frontend.
#
# mouse OFF (deliberate): with tmux mouse mode on, a drag is captured by tmux
# and copied via OSC 52 — which cannot reach the system clipboard over plain
# HTTP / the HA mobile app (no secure-context Clipboard API and no user gesture),
# so copies only landed in the tray. With mouse off, a drag is a NATIVE xterm.js
# selection that the frontend copies inside the pointer gesture (execCommand),
# so select-to-copy works like a local terminal everywhere. Trade-off: mouse
# clicks inside full-screen TUI apps aren't forwarded to them; the mouse wheel
# still scrolls (xterm handles it natively) and keyboard nav is unaffected.
set -g history-limit 50000
set -g mouse off
set -g allow-passthrough on
set -g set-clipboard on
set -g escape-time 0
set -g focus-events on
set -g aggressive-resize on
set -g renumber-windows off
set -g set-titles off
set -g status off
set -g default-terminal "xterm-256color"

# True-colour (24-bit) passthrough — without this tmux downsamples Claude's
# truecolor UI to 256 colours, which reads as muddy/banded.
set -ga terminal-overrides ",*:Tc"
