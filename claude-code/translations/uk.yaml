configuration:
  api_key:
    name: Ключ API Anthropic
    description: >-
      Ваш ключ API Anthropic з console.anthropic.com (починається на sk-ant-).
      Використовуйте, якщо платите за API напряму. Залиште порожнім, якщо у вас
      підписка Pro/Max/Team — тоді заповніть 'OAuth Token' або увійдіть
      інтерактивно через 'claude auth login'.
  oauth_token:
    name: OAuth-токен (підписка Pro/Max/Team)
    description: >-
      Довготривалий OAuth-токен для входу за підпискою.
      Виконайте 'claude setup-token' на будь-якій машині зі звичайним браузером
      (ноутбук, десктоп тощо) — команда виведе токен, дійсний близько року.
      Вставте його сюди. Так не доведеться вставляти код авторизації у
      ingress-термінал, що незручно всередині iframe HA. Примітка: коли цей
      токен заданий, у хедері консолі буде «Claude API» — це лише позначка входу
      токеном; білінг усе одно йде з вашої підписки, а не через pay-per-use API.
      Залиште порожнім, якщо використовуєте ключ API Anthropic.
  ha_token:
    name: Токен HA (Long-Lived Access Token)
    description: >-
      Довготривалий токен доступу Home Assistant. Створіть його в Home Assistant:
      Профіль → Безпека → Довготривалі токени доступу. Коли заданий, Claude може
      робити знімки дашбордів (ha-shot), користуватися hass-cli та інструментами
      hass-mcp і звертатися до Home Assistant по WebSocket/REST від вашого імені.
      Зберігається зашифрованим і переживає оновлення аддона. Залиште порожнім,
      щоб пропустити ці можливості.
  bypass_permissions:
    name: Пропускати запити дозволів
    description: >-
      Коли ввімкнено, Claude Code НЕ питатиме підтвердження перед запуском
      shell-команд, редагуванням файлів чи іншими діями.
      Вмикайте, лише якщо повністю довіряєте рішенням Claude.
      Відповідає прапорцю --dangerously-skip-permissions.
      Аддон автоматично встановлює IS_SANDBOX=1, щоб цей прапорець працював
      навіть попри те, що контейнер працює від root.
  auto_update:
    name: Автооновлення Claude Code
    description: >-
      Коли ввімкнено, Claude Code перевіряє та встановлює оновлення при кожному
      старті аддона. Вимкніть, якщо хочете зафіксувати конкретну версію.
      Оновити вручну завжди можна командою 'claude update' у терміналі.
  model:
    name: Перевизначення моделі
    description: >-
      Перевизначити модель Claude за замовчуванням. Приклади: claude-opus-4-6,
      claude-sonnet-4-6. Залиште порожнім, щоб використати модель за
      замовчуванням Claude Code.
  custom_instructions:
    name: Власні інструкції
    description: >-
      Додаткові інструкції, що додаються до вбудованого контексту Home Assistant
      (CLAUDE.md). Використовуйте, щоб додати свої вподобання, стандарти коду чи
      контекст проєкту.
  environment_vars:
    name: Додаткові змінні середовища
    description: >-
      Додаткові змінні середовища, які передаються в Claude Code.
      Формат: KEY=VALUE — по одному запису на рядок.
      Приклад: MY_VAR=hello або NODE_OPTIONS=--max-old-space-size=4096
  init_commands:
    name: Команди ініціалізації
    description: >-
      Shell-команди, що виконуються під час старту аддона перед запуском
      Claude Code. Зручно для встановлення додаткових інструментів чи
      MCP-серверів. Приклади: 'npm install -g @anthropic-ai/mcp-server-github'
      або 'apt-get install -y ffmpeg'
  plugins:
    name: Додаткові плагіни
    description: >-
      Додаткові плагіни Claude Code поверх вбудованого набору, по одному запису
      у форматі 'name@marketplace' (напр. 'coderabbit@claude-plugins-official').
      Встановлюються один раз і зберігаються між оновленнями. Базовий набір
      (superpowers, frontend-design, playwright, HA-скіли тощо) завжди присутній.
  marketplaces:
    name: Додаткові маркетплейси плагінів
    description: >-
      Додаткові маркетплейси плагінів для реєстрації, по одному на запис — GitHub
      'owner/repo', Git-URL або шлях. Потрібні перед встановленням плагінів з
      маркетплейсу, якого немає серед вбудованих.
  skills_git:
    name: Git-репозиторій власних скілів
    description: >-
      Необовʼязковий Git-репозиторій ваших власних скілів, що синхронізується в
      ~/.claude/skills при кожному старті. Кожна тека верхнього рівня в репо має
      бути одним скілом із файлом SKILL.md. Залиште порожнім, щоб пропустити.
  extra_args:
    name: Додаткові аргументи Claude
    description: >-
      Додаткові аргументи командного рядка до типового виклику 'claude'.
      По одному аргументу на запис (не обʼєднуйте кілька прапорців в одному рядку).
      Приклади: --resume, --model, claude-sonnet-4-6, --verbose
  launch_command:
    name: Власна команда запуску
    description: >-
      Повна команда для запуску замість типового виклику 'claude'.
      Коли задана, вона повністю замінює типовий запуск — bypass_permissions і
      extra_args ігноруються. Використовуйте для складніших сценаріїв, як-от
      обгортання claude іншим інструментом чи запуск іншого бінарника.
      Приклад: claude --resume --dangerously-skip-permissions
      Залиште порожнім для типової поведінки запуску.
  upload_retention_days:
    name: Зберігання завантажених файлів (днів)
    description: >-
      Файли, прикріплені через веб-консоль, зберігаються в /data/uploads.
      Файли, старші за цю кількість днів, видаляються автоматично.
      Встановіть 0, щоб зберігати завантаження назавжди.
  remote_control:
    name: Віддалене керування (мобільний застосунок Claude)
    description: >-
      Запускає 'claude remote-control' в окремій вкладці, щоб офіційний мобільний
      застосунок Claude / claude.ai міг керувати сесією цієї машини. Потребує
      повного '/login' у терміналі (підписка Pro/Max/Team) — OAuth-токена з
      'claude setup-token' чи ключа API недостатньо.
  monitoring_interval_hours:
    name: Проактивний моніторинг (годин)
    description: >-
      Коли більше 0, Claude періодично (кожні N годин) переглядає журнал помилок
      і конфігурацію HA і надсилає сповіщення, лише якщо знаходить щось варте
      уваги. Потребує входу в Claude і витрачає ліміт плану на кожну перевірку.
      Встановіть 0, щоб вимкнути (типово). Щоб отримувати перевірки на телефон,
      задайте також HA_NOTIFY_SERVICE у змінних середовища.
  daily_digest_time:
    name: Час ранкового зведення (HH:MM)
    description: >-
      Коли задано час на кшталт 08:00 (у часовому поясі аддона), Claude раз на
      день надсилає коротке дружнє ранкове зведення — сьогоднішня погода плюс
      делікатне нагадування про варте уваги (світло, лишене на ніч, відчинені
      двері, низький заряд батарей). Потребує входу в Claude і витрачає трохи
      ліміту плану раз на день. Залиште порожнім, щоб вимкнути. Щоб отримувати на
      телефон, задайте також HA_NOTIFY_SERVICE у змінних середовища (інакше буде
      у сповіщеннях HA).
  prompt_api:
    name: Prompt API (інтеграція claude_ha)
    description: >-
      Обслуговує захищений prompt API на внутрішньому порту 8126 для
      компаньйон-інтеграції 'Claude' (claude_ha) — спілкування з Claude через
      Assist, сервіс claude.ask і сенсор стану. Порт доступний лише всередині
      внутрішньої мережі Home Assistant, кожен запит потребує bearer-токена, а
      кожен промпт виконується в ізольованій сесії Claude лише для читання.
      Вимкніть, якщо не користуєтеся інтеграцією.
  api_token:
    name: Токен Prompt API (необовʼязково)
    description: >-
      Bearer-токен, який інтеграція claude_ha має пред'являти prompt API.
      Залиште порожнім (рекомендовано): аддон сам згенерує надійний токен і
      передасть його інтеграції через Supervisor discovery — без ручного
      налаштування. Задавайте, лише якщо хочете фіксований відомий токен як
      ручний резервний варіант.
  prompt_ha_token:
    name: HA-токен для Prompt API (необовʼязково, обмежений користувач)
    description: >-
      Довготривалий токен доступу Home Assistant, який використовують ЛИШЕ сесії
      prompt API для читання стану Home Assistant через інтеграцію Model Context
      Protocol Server. Найкраще: створіть окремого не-адмін користувача Home
      Assistant і вставте його токен сюди. Залиште порожнім, щоб використати
      'Токен HA'. У будь-якому разі Claude бачить лише сутності, відкриті для
      Assist.
  chat_model:
    name: Модель чату (інтеграція claude_ha)
    description: >-
      Необовʼязкове перевизначення моделі ЛИШЕ для компаньйон-чату (інтеграція
      claude_ha), окремо від консолі. Вкажіть швидшу й дешевшу модель (напр.
      claude-sonnet-4-6) для миттєвих недорогих відповідей в Assist, поки консоль
      лишається на своїй моделі. Залиште порожнім, щоб узяти «Перевизначення
      моделі» вище або модель Claude за замовчуванням.
  chat_daily_budget_usd:
    name: Денний бюджет чату (USD)
    description: >-
      Необовʼязкова запобіжна межа, скільки компаньйон-чат може витратити за день
      (у доларах США, за оцінкою вартості від Claude). Коли денні витрати чату
      сягають цієї суми, чат ввічливо стає на паузу до наступного дня — захист
      від автоматизації-циклу чи надмірного використання, що виснажує ваш план.
      Консолі це не стосується. 0 — вимкнено (без ліміту). Скидається щодня і при
      перезапуску аддона.
