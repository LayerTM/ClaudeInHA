name: "Claude Code"
version: "1.38.0"
slug: claude-code
description: "Claude Code AI assistant embedded in Home Assistant — web console with tabs, clipboard, file attachments, browser testing, and a bundled HA skill pack"
url: "https://github.com/LayerTM/ClaudeInHA"

arch:
  - aarch64
  - amd64

init: false
timeout: 300
# Self-healing uses the Docker HEALTHCHECK in the Dockerfile (the config-level
# `watchdog:` key is obsolete). The Supervisor restarts the add-on when the
# console's /api/health stops responding.

ingress: true
ingress_entry: /
ingress_stream: true
panel_icon: "mdi:console-line"
panel_title: "Claude Code"

hassio_api: true
homeassistant_api: true
# manager: needed so Claude can create safety backups (POST /backups) before
# risky changes and manage add-ons via the Supervisor API.
hassio_role: manager

# Announces the prompt API (host/port/token) to the Supervisor so the
# companion claude_ha integration configures itself with zero user input.
discovery:
  - claude_ha

map:
  - type: homeassistant_config
    read_only: false
  - type: addon_config
    read_only: false
  - type: share
    read_only: false
  - type: ssl
  - type: media
    read_only: false
  - type: backup

options:
  api_key: ""
  oauth_token: ""
  ha_token: ""
  bypass_permissions: false
  auto_update: true
  model: ""
  custom_instructions: ""
  environment_vars: []
  init_commands: []
  plugins: []
  marketplaces: []
  skills_git: ""
  extra_args: []
  launch_command: ""
  upload_retention_days: 14
  remote_control: false
  monitoring_interval_hours: 0
  daily_digest_time: ""
  proactive_alerts: false
  proactive_alerts_interval_minutes: 15
  alert_battery_below: 15
  alert_water_leak: true
  alert_open_at_night: true
  alert_night_start: "23:00"
  alert_night_end: "06:00"
  alert_temp_enabled: false
  alert_temp_low: 5
  alert_temp_high: 45
  alert_co2_above: 1400
  alert_offline: true
  alert_offline_entities:
    - "device_tracker.ucg_fiber"
  alert_quiet_hours: ""
  prompt_api: true
  api_token: ""
  prompt_ha_token: ""
  chat_model: ""
  chat_model_voice: ""
  chat_daily_budget_usd: 0

schema:
  api_key: "password"
  oauth_token: "password"
  ha_token: "password"
  bypass_permissions: bool
  auto_update: bool
  model: "str?"
  custom_instructions: "str?"
  environment_vars:
    - "str"
  init_commands:
    - "str"
  plugins:
    - "str"
  marketplaces:
    - "str"
  skills_git: "str?"
  extra_args:
    - "str"
  launch_command: "str?"
  upload_retention_days: "int(0,365)?"
  remote_control: bool
  monitoring_interval_hours: "int(0,168)?"
  daily_digest_time: "str?"
  proactive_alerts: bool
  proactive_alerts_interval_minutes: "int(1,1440)?"
  alert_battery_below: "int(0,100)?"
  alert_water_leak: bool
  alert_open_at_night: bool
  alert_night_start: "str?"
  alert_night_end: "str?"
  alert_temp_enabled: bool
  alert_temp_low: "float?"
  alert_temp_high: "float?"
  alert_co2_above: "int(0,)?"
  alert_offline: bool
  alert_offline_entities:
    - "str"
  alert_quiet_hours: "str?"
  prompt_api: bool
  api_token: "password"
  prompt_ha_token: "password"
  chat_model: "str?"
  chat_model_voice: "str?"
  chat_daily_budget_usd: "float(0,)?"
