name: "Claude Code"
version: "1.4.1"
slug: claude-code
description: "Claude Code AI assistant embedded in Home Assistant — web console with tabs, clipboard, file attachments, browser testing, and a bundled HA skill pack"
url: "https://github.com/LayerTM/ClaudeInHA"

arch:
  - aarch64
  - amd64

init: false
timeout: 300

ingress: true
ingress_entry: /
ingress_stream: true
panel_icon: "mdi:console-line"
panel_title: "Claude Code"

hassio_api: true
homeassistant_api: true

map:
  - type: homeassistant_config
    read_only: false
  - type: addon_config
    read_only: false
  - type: share
    read_only: false
  - type: ssl
  - type: media
    read_only: false
  - type: backup

options:
  api_key: ""
  oauth_token: ""
  ha_token: ""
  bypass_permissions: false
  auto_update: true
  model: ""
  custom_instructions: ""
  environment_vars: []
  init_commands: []
  plugins: []
  marketplaces: []
  skills_git: ""
  extra_args: []
  launch_command: ""
  upload_retention_days: 14
  remote_control: false
  monitoring_interval_hours: 0

schema:
  api_key: "password"
  oauth_token: "password"
  ha_token: "password"
  bypass_permissions: bool
  auto_update: bool
  model: "str?"
  custom_instructions: "str?"
  environment_vars:
    - "str"
  init_commands:
    - "str"
  plugins:
    - "str"
  marketplaces:
    - "str"
  skills_git: "str?"
  extra_args:
    - "str"
  launch_command: "str?"
  upload_retention_days: "int(0,365)?"
  remote_control: bool
  monitoring_interval_hours: "int(0,168)?"

stage: experimental
