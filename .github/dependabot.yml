# Dependabot configuration.
#
# Groups intentionally omit `update-types`: with patterns:["*"], adding an
# update-types filter silently suppresses major-version PRs upstream
# (dependabot/dependabot-core#14202 — open). Majors therefore group in with
# minor/patch, and the dependabot-auto-merge workflow's fail-closed guard holds
# any group PR containing a major for manual review; minor/patch-only groups
# auto-merge.
version: 2
updates:
  # All GitHub Actions referenced by the workflows under .github/workflows/.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels: ["dependencies"]
    groups:
      github-actions:
        patterns: ["*"]

  # npm dependencies for the web console (express / ws / node-pty / busboy /
  # @xterm / eslint / tsc).
  - package-ecosystem: npm
    directory: "/claude-code/app"
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    labels: ["dependencies"]
    groups:
      npm-app:
        patterns: ["*"]

  # npm dependencies for the ha-shot screenshot helper (playwright-core drives
  # the system Chromium). Separate manifest + lockfile from the console app.
  - package-ecosystem: npm
    directory: "/claude-code/ha-tools"
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    labels: ["dependencies"]
    groups:
      npm-ha-tools:
        patterns: ["*"]
