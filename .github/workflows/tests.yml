name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  prompt-server:
    name: Prompt server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: claude-code/app
        run: npm ci
      - name: Run tests
        working-directory: claude-code/app
        run: npm test
