name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  prompt-server:
    name: Prompt server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "26"
      - name: Install dependencies
        working-directory: claude-code/app
        run: npm ci
      - name: Run tests
        working-directory: claude-code/app
        run: npm test
      - name: Run alerts loop tests (bash + jq)
        working-directory: claude-code/app
        run: npm run test:alerts

  lint-js:
    name: JS lint & types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "26"
      - name: Install dependencies
        working-directory: claude-code/app
        run: npm ci
      - name: Lint (eslint)
        working-directory: claude-code/app
        run: npm run lint
      - name: Type-check (tsc --checkJs)
        working-directory: claude-code/app
        run: npm run typecheck
