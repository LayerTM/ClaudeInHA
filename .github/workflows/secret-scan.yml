name: secret-scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Self-test the scanner
        working-directory: .github/scripts
        run: python test_secret_scan.py
      - name: Scan tracked files for secrets and personal data
        run: python .github/scripts/secret_scan.py .
